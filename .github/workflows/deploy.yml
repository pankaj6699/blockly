name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Print Pages config
        run: |
          echo "base_url=${{ steps.pages.outputs.base_url }}"
          echo "origin=${{ steps.pages.outputs.origin }}"
          echo "host=${{ steps.pages.outputs.host }}"
          echo "base_path=${{ steps.pages.outputs.base_path }}"

      - name: Install dependencies
        run: npm ci

      # No basePath — site is served at https://blocly.co/ (custom domain root).
      # Do NOT set static_site_generator: next (it injects /blockly basePath and breaks the custom domain).
      - name: Build static site
        run: npm run build

      - name: Copy CNAME to out directory
        run: cp public/CNAME out/CNAME

      - name: Verify build output
        run: |
          test -f out/index.html
          test -f out/CNAME
          grep -q "blocly.co" out/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
